/* ── MAIN APP ────────────────────────────────────────────── */
function App() {
  const { currentUser, hasPermission } = useAuth();
  const [screen, setScreen] = useState("login");
  const [tasks, setTasks] = useState(INITIAL_TASKS);
  const [activeModal, setActiveModal] = useState(null);
  const [showNewTask, setShowNewTask] = useState(false);
  const [filter, setFilter] = useState("all");
  const [dragState, setDragState] = useState({ dragId: null, overCol: null });
  const [toasts, setToasts] = useState([]);
  const [sidebarCollapsed, setSidebarCollapsed] = useState(false);
  const [activeNav, setActiveNav] = useState("board");
  const [columns, setColumns] = useState([
    { id: "backlog",  label: "BACKLOG",       locked: true },
    { id: "doing",    label: "EM ANDAMENTO",  locked: true },
    { id: "review",   label: "REVISÃO",       locked: false },
    { id: "done",     label: "CONCLUÍDO",     locked: true },
  ]);
  const [tickets, setTickets] = useState(INITIAL_TICKETS);
  const toastTimer = useRef({});

  function addToast(message) {
    const id = Date.now();
    setToasts(prev => [...prev, { id, message, exiting: false }]);
    toastTimer.current[id] = setTimeout(() => {
      setToasts(prev => prev.map(t => t.id === id ? { ...t, exiting: true } : t));
      setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 350);
    }, 2800);
  }

  function handleLogin() { setScreen("app"); }

  function handleDragStart(e, taskId) {
    e.dataTransfer.effectAllowed = "move";
    setDragState(prev => ({ ...prev, dragId: taskId }));
  }

  function handleDragEnd() {
    setDragState({ dragId: null, overCol: null });
  }

  function handleDrop(e, colId) {
    e.preventDefault();
    const { dragId } = dragState;
    if (!dragId) return;
    const task = tasks.find(t => t.id === dragId);
    if (!task || task.status === colId) return;
    setTasks(prev => prev.map(t => t.id === dragId ? { ...t, status: colId } : t));
    const colName = columns.find(c => c.id === colId)?.label;
    addToast(`"${task.title.slice(0, 30)}…" movido para ${colName}`);
    setDragState({ dragId: null, overCol: null });
  }

  function handleAddColumn(label) {
    const id = label.toLowerCase().replace(/\s+/g, "_").replace(/[^a-z0-9_]/g, "") + "_" + Date.now();
    setColumns(prev => {
      const idx = prev.findIndex(c => c.id === "done");
      const next = [...prev];
      next.splice(idx, 0, { id, label: label.toUpperCase(), locked: false });
      return next;
    });
    addToast(`Coluna "${label.toUpperCase()}" criada!`);
  }

  function handleRemoveColumn(colId) {
    const col = columns.find(c => c.id === colId);
    if (!col || col.locked) return;
    const orphans = tasks.filter(t => t.status === colId);
    if (orphans.length > 0) {
      setTasks(prev => prev.map(t => t.status === colId ? { ...t, status: "backlog" } : t));
      addToast(`${orphans.length} tarefa(s) movida(s) para o Backlog.`);
    }
    setColumns(prev => prev.filter(c => c.id !== colId));
    addToast(`Coluna removida.`);
  }

  function handleRenameColumn(colId, newLabel) {
    setColumns(prev => prev.map(c => c.id === colId ? { ...c, label: newLabel.toUpperCase() } : c));
  }

  function handleCardClick(task) { setActiveModal(task); }

  function handleSaveTask(updated) {
    setTasks(prev => prev.map(t => t.id === updated.id ? updated : t));
    setActiveModal(null);
    addToast("Tarefa salva com sucesso.");
  }

  function handleDeleteTask(id) {
    setTasks(prev => prev.filter(t => t.id !== id));
    setActiveModal(null);
    addToast("Tarefa excluída.");
  }

  function handleAcceptTask(id) {
    const task = tasks.find(t => t.id === id);
    if (!task) return;
    
    // Regra: Membro não pode aceitar se já tiver dono
    if (currentUser.role === "membro" && task.assignee) {
      addToast("Esta tarefa já possui um responsável.");
      return;
    }

    const updatedTasks = tasks.map(t => t.id === id ? {
      ...t,
      assignee: currentUser.name === "Você" ? "Você" : currentUser.name,
      assigneeInitials: currentUser.initials
    } : t);
    
    setTasks(updatedTasks);
    if (activeModal && activeModal.id === id) {
      setActiveModal({ ...activeModal, assignee: currentUser.name, assigneeInitials: currentUser.initials });
    }
    addToast("✅ Tarefa aceita com sucesso!");
  }

  function handleCreateTicket(data) {
    const newTicket = {
      id: tickets.length + 1,
      ...data,
      authorId: currentUser.id,
      author: currentUser.name,
      authorInitials: currentUser.initials,
      status: "aberto",
      createdAt: new Date().toISOString(),
      responses: []
    };
    setTickets(prev => [newTicket, ...prev]);
    addToast("✅ Registro aberto com sucesso!");
  }

  function handleRespondTicket(id, text) {
    setTickets(prev => prev.map(t => t.id === id ? {
      ...t,
      responses: [...t.responses, {
        id: t.responses.length + 1,
        authorId: currentUser.id,
        author: currentUser.name,
        authorInitials: currentUser.initials,
        role: currentUser.role,
        text,
        createdAt: new Date().toISOString()
      }]
    } : t));
    addToast("✅ Resposta enviada!");
  }

  function handleUpdateTicketStatus(id, status) {
    setTickets(prev => prev.map(t => t.id === id ? { ...t, status } : t));
    addToast(`Status alterado para: ${status.replace("_", " ")}`);
  }

  const availableCount = tasks.filter(t => !t.assignee).length;

  const filteredTasks = tasks.filter(t => {
    if (filter === "available") return !t.assignee;
    // Restrição Membro: Vê apenas suas tarefas (exceto se estiver filtrando disponíveis)
    if (currentUser.role === "membro") {
      if (t.assigneeInitials !== currentUser.initials && t.assignee !== null) return false;
    }
    
    if (filter === "mine") return t.assignee === "Você" || t.assigneeInitials === "VC" || t.assigneeInitials === currentUser.initials;
    if (filter === "overdue") return isOverdue(t.due) && t.status !== "done";
    return true;
  });

  if (screen === "login") return <Login onLogin={handleLogin} />;

  return (
    <div style={{ display: "flex", flexDirection: "column", height: "100vh", overflow: "hidden" }}>
      {/* Header */}
      <header style={{
        height: 56, background: "var(--bg-base)", borderBottom: "1px solid var(--border)",
        display: "flex", alignItems: "center", padding: "0 20px",
        gap: 16, flexShrink: 0, zIndex: 100,
      }}>
        <button
          onClick={() => setSidebarCollapsed(p => !p)}
          style={{ background: "none", border: "none", cursor: "pointer", color: "var(--text-secondary)", fontSize: 16, padding: "6px", borderRadius: 6, transition: "color 0.15s, background 0.15s" }}
          onMouseOver={e => { e.currentTarget.style.color = "var(--text-primary)"; e.currentTarget.style.background = "var(--bg-surface)"; }}
          onMouseOut={e => { e.currentTarget.style.color = "var(--text-secondary)"; e.currentTarget.style.background = "transparent"; }}
        >☰</button>

        <div style={{ fontFamily: "'Syne', sans-serif", fontWeight: 700, fontSize: 20, color: "var(--text-primary)", letterSpacing: "-0.5px" }}>
          FLOW<span style={{ color: "var(--accent)" }}>.</span>
        </div>

        <div style={{ flex: 1, display: "flex", justifyContent: "center" }}>
          <button style={{
            background: "var(--bg-surface)", border: "1px solid var(--border)",
            borderRadius: 8, color: "var(--text-primary)", fontSize: 13, fontWeight: 500,
            padding: "6px 14px", cursor: "pointer", fontFamily: "'DM Sans', sans-serif",
          }}>
            Projeto Alpha ▾
          </button>
        </div>

        {/* Filters */}
        <div style={{ display: "flex", gap: 2 }}>
          {[
            { key: "all", label: "Todas" },
            { key: "mine", label: "Minhas" },
            { key: "available", label: `Disponíveis (${availableCount})` },
            { key: "overdue", label: "Atrasadas" }
          ].map(f => (
            <button
              key={f.key}
              onClick={() => setFilter(f.key)}
              style={{
                background: "none", border: "none", cursor: "pointer",
                color: filter === f.key ? (f.key === "available" ? "var(--accent)" : "var(--text-primary)") : "var(--text-secondary)",
                fontSize: 13, padding: "6px 10px", borderRadius: 6,
                borderBottom: filter === f.key ? "2px solid var(--accent)" : "2px solid transparent",
                fontFamily: "'DM Sans', sans-serif", transition: "all 0.15s",
              }}
            >{f.label}</button>
          ))}
        </div>

        {hasPermission("create_task") && (
          <button
            onClick={() => setShowNewTask(true)}
            style={{
              background: "transparent", border: "1px solid var(--accent)", borderRadius: 8,
              color: "var(--accent)", fontSize: 13, fontWeight: 500, padding: "7px 14px",
              cursor: "pointer", fontFamily: "'DM Sans', sans-serif", transition: "background 0.15s",
              display: "flex", alignItems: "center", gap: 6,
            }}
            onMouseOver={e => e.currentTarget.style.background = "var(--accent-soft)"}
            onMouseOut={e => e.currentTarget.style.background = "transparent"}
          >
            <span style={{ fontSize: 16, lineHeight: 1 }}>+</span> Nova Tarefa
          </button>
        )}

        <Avatar initials={currentUser.initials} size={32} roleBadge={currentUser.role} />
      </header>

      {/* Body */}
      <div style={{ display: "flex", flex: 1, overflow: "hidden" }}>
        <Sidebar collapsed={sidebarCollapsed} activeNav={activeNav} setActiveNav={setActiveNav} />

        {/* Views */}
        {activeNav === "board" && (
          <main style={{
            flex: 1, overflowX: "auto", overflowY: "hidden",
            padding: "20px 24px",
            display: "flex", gap: 16, alignItems: "flex-start",
          }}>
            {columns.map(col => (
              <Column
                key={col.id}
                col={col}
                tasks={filteredTasks.filter(t => t.status === col.id)}
                onCardClick={handleCardClick}
                dragState={dragState}
                onDragStart={handleDragStart}
                onDragEnd={handleDragEnd}
                onDrop={handleDrop}
                onDragOver={colId => setDragState(prev => ({ ...prev, overCol: colId }))}
                onAccept={handleAcceptTask}
                isAdmin={currentUser.role === "admin"}
                onRename={handleRenameColumn}
                onRemove={handleRemoveColumn}
              />
            ))}
            
            {currentUser.role === "admin" && (
              <NewColumnGhost onAdd={handleAddColumn} />
            )}
          </main>
        )}
        {activeNav === "home" && <Dashboard tasks={filteredTasks} onTaskClick={handleCardClick} />}
        {activeNav === "timeline" && <Timeline />}
        {activeNav === "reports" && <Reports tasks={filteredTasks} />}
        {activeNav === "registros" && (
          <Registros
            tickets={tickets}
            onUpdateStatus={handleUpdateTicketStatus}
            onCreate={handleCreateTicket}
            onRespond={handleRespondTicket}
          />
        )}
        {activeNav === "settings" && <Settings />}
      </div>

      {/* Modals */}
      {activeModal && (
        <TaskModal
          task={activeModal}
          onClose={() => setActiveModal(null)}
          onSave={handleSaveTask}
          onDelete={handleDeleteTask}
          onAccept={handleAcceptTask}
        />
      )}
      {showNewTask && (
        <NewTaskModal
          onClose={() => setShowNewTask(false)}
          onCreate={handleCreateTask}
          columns={columns}
        />
      )}

      {/* Tweaks */}
      <TweaksPanel />

      {/* Role Selector (Dev Only) */}
      <RoleSelector />

      {/* Toasts */}
      <Toast toasts={toasts} />
    </div>
  );
}

/* ── TWEAKS PANEL ────────────────────────────────────────── */
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentColor": "#00FF87",
  "cardRadius": 2,
  "compactMode": false,
  "showAnimations": true
}/*EDITMODE-END*/;

function TweaksPanel() {
  const [visible, setVisible] = useState(false);
  const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);

  useEffect(() => {
    window.addEventListener("message", e => {
      if (e.data?.type === "__activate_edit_mode")   setVisible(true);
      if (e.data?.type === "__deactivate_edit_mode") setVisible(false);
    });
    window.parent.postMessage({ type: "__edit_mode_available" }, "*");
  }, []);

  function set(key, val) {
    const next = { ...tweaks, [key]: val };
    setTweaks(next);
    window.parent.postMessage({ type: "__edit_mode_set_keys", edits: next }, "*");
    // Apply live
    if (key === "accentColor") {
      document.documentElement.style.setProperty("--accent", val);
      document.documentElement.style.setProperty("--accent-dark", val);
    }
    if (key === "cardRadius") {
      document.documentElement.style.setProperty("--card-radius", val + "px");
    }
  }

  if (!visible) return null;

  return (
    <div style={{
      position: "fixed", bottom: 24, left: 24, zIndex: 9000,
      background: "var(--bg-modal)", border: "1px solid var(--border)",
      borderRadius: 12, padding: "16px 18px", width: 220,
      boxShadow: "0 8px 32px rgba(0,0,0,0.6)",
    }}>
      <div style={{ fontSize: 11, fontWeight: 600, color: "var(--text-secondary)", letterSpacing: "0.12em", textTransform: "uppercase", marginBottom: 14 }}>Tweaks</div>

      <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
        <label style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <span style={{ fontSize: 12, color: "var(--text-secondary)" }}>Cor accent</span>
          <input type="color" value={tweaks.accentColor} onChange={e => set("accentColor", e.target.value)}
            style={{ width: 32, height: 24, border: "none", background: "none", cursor: "pointer", borderRadius: 4 }} />
        </label>

        <label style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <span style={{ fontSize: 12, color: "var(--text-secondary)" }}>Raio dos cards</span>
          <input type="range" min={0} max={20} value={tweaks.cardRadius} onChange={e => set("cardRadius", +e.target.value)}
            style={{ width: 80, accentColor: "var(--accent)" }} />
        </label>

        <label style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <span style={{ fontSize: 12, color: "var(--text-secondary)" }}>Modo compacto</span>
          <div
            onClick={() => set("compactMode", !tweaks.compactMode)}
            style={{
              width: 32, height: 18, borderRadius: 99, cursor: "pointer", transition: "background 0.2s",
              background: tweaks.compactMode ? "var(--accent)" : "var(--border)",
              position: "relative",
            }}
          >
            <div style={{
              position: "absolute", top: 2, left: tweaks.compactMode ? 14 : 2,
              width: 14, height: 14, borderRadius: "50%",
              background: tweaks.compactMode ? "#0D0D0D" : "#7A7A7A",
              transition: "left 0.2s",
            }}/>
          </div>
        </label>
      </div>
    </div>
  );
}

function RoleSelector() {
  const { currentUser, setCurrentUser } = useAuth();
  
  return (
    <div style={{
      position: "fixed", bottom: 24, left: 24, zIndex: 9000,
      background: "var(--bg-modal)", border: "1px solid var(--border)",
      borderRadius: 12, padding: "16px 18px", width: 220,
      boxShadow: "0 8px 32px rgba(0,0,0,0.6)",
    }}>
      <div style={{ fontSize: 11, fontWeight: 600, color: "var(--text-secondary)", letterSpacing: "0.12em", textTransform: "uppercase", marginBottom: 14 }}>Testar como:</div>
      <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
        {USERS.filter(u => ["admin", "gestor", "membro"].includes(u.role)).map(u => {
          const isMe = currentUser.id === u.id;
          return (
            <button
              key={u.id}
              onClick={() => setCurrentUser(u)}
              style={{
                padding: "8px 12px", borderRadius: 8, fontSize: 13, cursor: "pointer",
                background: isMe ? "var(--accent-soft)" : "var(--bg-surface)",
                border: isMe ? "1px solid var(--accent)" : "1px solid var(--border)",
                color: isMe ? "var(--accent)" : "var(--text-primary)",
                fontFamily: "'DM Sans', sans-serif", textAlign: "left", transition: "all 0.2s"
              }}
            >
              {u.name} ({u.role})
            </button>
          );
        })}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(
  <AuthProvider>
    <App />
  </AuthProvider>
);
</script>
</body>
</html>
