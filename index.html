<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  :root {
    --bg-base: #0D0D0D;
    --bg-surface: #161616;
    --bg-card: #1F1F1F;
    --bg-modal: #242424;
    --accent: #00FF87;
    --accent-soft: #00FF8720;
    --accent-dark: #00C96A;
    --text-primary: #F0F0F0;
    --text-secondary: #7A7A7A;
    --text-disabled: #3A3A3A;
    --border: #2A2A2A;
    --status-urgent: #FF4C4C;
    --status-medium: #FFB800;
    --status-ok: #00FF87;
    --status-neutral: #3A3A3A;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body, #root { height: 100%; width: 100%; }
  body {
    background: var(--bg-base);
    color: var(--text-primary);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #2A2A2A; border-radius: 2px; }

  /* Noise texture */
  .noise::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
    opacity: 0.5;
  }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes scaleIn {
    from { opacity: 0; transform: scale(0.96); }
    to   { opacity: 1; transform: scale(1); }
  }
  @keyframes slideInRight {
    from { opacity: 0; transform: translateX(16px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  @keyframes toastIn {
    from { opacity: 0; transform: translateY(12px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
  @keyframes toastOut {
    from { opacity: 1; transform: translateY(0); }
    to   { opacity: 0; transform: translateY(8px); }
  }
  .anim-fadeInUp { animation: fadeInUp 0.35s ease both; }
  .anim-scaleIn  { animation: scaleIn 0.2s ease both; }
</style>
</head>
<body class="noise">
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

/* ── MOCK DATA ───────────────────────────────────────────── */
const INITIAL_TASKS = [

  { id: 2,  title: "Integração com API de pagamento",   priority: "medium", assignee: "Lucas M.", assigneeInitials: "LM", due: "2025-06-18", subtasks: { done: 4, total: 4 }, status: "review",  tags: ["Dev", "API"] },
  { id: 3,  title: "Documentar fluxo de onboarding",    priority: "low",    assignee: "Carla T.", assigneeInitials: "CT", due: "2025-06-25", subtasks: { done: 0, total: 3 }, status: "backlog", tags: ["Docs"] },
  { id: 4,  title: "Testes de usabilidade",             priority: "medium", assignee: "João P.",  assigneeInitials: "JP", due: "2025-06-05", subtasks: { done: 1, total: 2 }, status: "done",    tags: ["UX"] },
  { id: 5,  title: "Configurar CI/CD no GitHub Actions",priority: "urgent", assignee: "Lucas M.", assigneeInitials: "LM", due: "2025-05-28", subtasks: { done: 1, total: 4 }, status: "doing",   tags: ["Dev", "Infra"] },
  { id: 6,  title: "Criar componente de DatePicker",    priority: "low",    assignee: "Ana S.",   assigneeInitials: "AS", due: "2025-07-01", subtasks: { done: 0, total: 2 }, status: "backlog", tags: ["Design", "Dev"] },
  { id: 7,  title: "Análise de métricas — Sprint 4",   priority: "medium", assignee: "Carla T.", assigneeInitials: "CT", due: "2025-06-12", subtasks: { done: 3, total: 3 }, status: "review",  tags: ["Analytics"] },
  { id: 8,  title: "Atualizar dependências do projeto", priority: "low",    assignee: "João P.",  assigneeInitials: "JP", due: "2025-06-30", subtasks: { done: 0, total: 1 }, status: "backlog", tags: ["Manutenção"] },
  { id: 9,  title: "Criar landing page do produto",     priority: "medium", assignee: null,       assigneeInitials: null, due: "2025-07-05", subtasks: { done: 0, total: 0 }, status: "backlog", tags: ["Design"] },
  { id: 10, title: "Revisar documentação da API",      priority: "low",    assignee: null,       assigneeInitials: null, due: "2025-07-10", subtasks: { done: 0, total: 0 }, status: "backlog", tags: ["Docs"] },
  { id: 11, title: "Corrigir bug no formulário",        priority: "urgent", assignee: null,       assigneeInitials: null, due: "2025-06-15", subtasks: { done: 0, total: 0 }, status: "backlog", tags: ["Dev"] },
];

const COLUMNS = [
  { id: "backlog", label: "BACKLOG" },
  { id: "doing",   label: "EM ANDAMENTO" },
  { id: "review",  label: "REVISÃO" },
  { id: "done",    label: "CONCLUÍDO" },
];

const INITIAL_TICKETS = [
  { id: 1, type: "duvida", title: "Como mover tarefa para revisão?", description: "Não estou conseguindo arrastar o card para a coluna revisão.", authorId: "u4", author: "João P.", authorInitials: "JP", taskId: 3, taskTitle: "Documentar fluxo de onboarding", status: "aberto", priority: "normal", createdAt: "2025-06-08T10:00:00", responses: [{ id: 1, authorId: "u1", author: "Ana S.", authorInitials: "AS", role: "admin", text: "Olá João! Você pode arrastar segurando o botão esquerdo do mouse no card.", createdAt: "2025-06-08T11:30:00" }] },
  { id: 2, type: "problema", title: "Bug na tela de login", description: "Ao tentar entrar com magic link o sistema retorna erro 404.", authorId: "u3", author: "Carla T.", authorInitials: "CT", taskId: null, taskTitle: null, status: "em_analise", priority: "urgente", createdAt: "2025-06-07T14:00:00", responses: [] },
  { id: 3, type: "sugestao", title: "Adicionar filtro por data no Kanban", description: "Seria útil poder filtrar as tarefas por período de prazo.", authorId: "u4", author: "João P.", authorInitials: "JP", taskId: null, taskTitle: null, status: "aberto", priority: "normal", createdAt: "2025-06-06T09:00:00", responses: [] },
];

/* ── AUTH & ROLES ────────────────────────────────────────── */
const USERS = [
  { id: "u1", name: "Ana S.",    initials: "AS", role: "admin",  email: "ana@flow.com" },
  { id: "u2", name: "Lucas M.",  initials: "LM", role: "gestor", email: "lucas@flow.com" },
  { id: "u3", name: "Carla T.",  initials: "CT", role: "membro", email: "carla@flow.com" },
  { id: "u4", name: "João P.",   initials: "JP", role: "membro", email: "joao@flow.com" },
  { id: "u5", name: "Você",      initials: "VC", role: "admin",  email: "voce@flow.com" },
];

const PERMISSIONS = {
  admin:  ["view_all_tasks", "edit_any_task", "delete_task", "manage_members", "view_reports", "view_dashboard", "create_task", "invite_members"],
  gestor: ["view_all_tasks", "edit_any_task", "view_reports", "view_dashboard", "create_task"],
  membro: ["edit_own_task"], // Membros podem apenas editar suas tarefas e mover entre colunas (implícito)
};

const AuthContext = React.createContext();

function AuthProvider({ children, forcedUser }) {
  const [currentUser, setCurrentUser] = useState(forcedUser || USERS[4]); // Default Admin (Você)

  const hasPermission = (action) => {
    const userPermissions = PERMISSIONS[currentUser.role] || [];
    return userPermissions.includes(action);
  };

  return (
    <AuthContext.Provider value={{ currentUser, setCurrentUser, hasPermission }}>
      {children}
    </AuthContext.Provider>
  );
}

const useAuth = () => React.useContext(AuthContext);

const PRIORITY_COLORS = { urgent: "#FF4C4C", medium: "#FFB800", low: "#00FF87" };
const PRIORITY_LABELS = { urgent: "Urgente", medium: "Média", low: "Baixa" };

const TODAY = new Date("2025-06-09");

/* ── UTILS ───────────────────────────────────────────────── */
function formatDue(dateStr) {
  const d = new Date(dateStr + (dateStr.includes("T") ? "" : "T00:00:00"));
  return d.toLocaleDateString("pt-BR", { day: "2-digit", month: "short" });
}

function timeAgo(dateStr) {
  const date = new Date(dateStr);
  const now = new Date("2025-06-09T12:00:00");
  const diffInSeconds = Math.floor((now - date) / 1000);
  
  if (diffInSeconds < 60) return "agora mesmo";
  if (diffInSeconds < 3600) return `há ${Math.floor(diffInSeconds / 60)}min`;
  if (diffInSeconds < 86400) return `há ${Math.floor(diffInSeconds / 3600)}h`;
  return `há ${Math.floor(diffInSeconds / 86400)} dias`;
}
function isOverdue(dateStr) {
  return new Date(dateStr + "T00:00:00") < TODAY;
}
function getInitials(name) {
  return name.split(" ").map(p => p[0]).join("").slice(0, 2).toUpperCase();
}
let _nextId = 100;
function newId() { return ++_nextId; }

/* ── AVATAR ──────────────────────────────────────────────── */
function Avatar({ initials, size = 24, color = "#00FF87", roleBadge }) {
  const safeInitials = initials || "?";
  const hue = safeInitials.charCodeAt(0) % 360;
  const bg = `oklch(0.35 0.08 ${hue})`;
  
  const roleColors = { admin: "#00FF87", gestor: "#FFB800", membro: "#7A7A7A" };
  const badgeBorder = roleBadge ? roleColors[roleBadge] : null;

  return (
    <div style={{ position: "relative", display: "inline-block" }}>
      <div style={{
        width: size, height: size, borderRadius: "50%",
        background: bg, display: "flex", alignItems: "center",
        justifyContent: "center", fontSize: size * 0.38,
        fontWeight: 600, color: "#F0F0F0", flexShrink: 0,
        border: badgeBorder ? `1.5px solid ${badgeBorder}` : "1.5px solid #2A2A2A",
        fontFamily: "'DM Sans', sans-serif",
      }}>{safeInitials}</div>
      {roleBadge && (
        <div style={{
          position: "absolute", bottom: -6, left: "50%", transform: "translateX(-50%)",
          background: "var(--bg-card)", border: `1px solid ${badgeBorder}`,
          borderRadius: 4, padding: "1px 4px", fontSize: 8, fontWeight: 700,
          color: badgeBorder, textTransform: "uppercase", whiteSpace: "nowrap",
          zIndex: 2, pointerEvents: "none"
        }}>
          {roleBadge}
        </div>
      )}
    </div>
  );
}

/* ── TOAST ───────────────────────────────────────────────── */
function Toast({ toasts }) {
  return (
    <div style={{ position: "fixed", bottom: 24, right: 24, zIndex: 10000, display: "flex", flexDirection: "column", gap: 8 }}>
      {toasts.map(t => (
        <div key={t.id} style={{
          background: "var(--bg-card)", border: "1px solid var(--border)",
          borderLeft: "3px solid var(--accent)", borderRadius: 8,
          padding: "12px 16px", color: "var(--text-primary)", fontSize: 13,
          boxShadow: "0 8px 32px rgba(0,0,0,0.5)",
          animation: t.exiting ? "toastOut 0.3s ease forwards" : "toastIn 0.3s ease both",
          maxWidth: 300, lineHeight: 1.4,
        }}>
          {t.message}
        </div>
      ))}
    </div>
  );
}

/* ── LOGIN SCREEN ────────────────────────────────────────── */
function Login({ onLogin }) {
  const [email, setEmail] = useState("");
  const [sent, setSent] = useState(false);
  const [loading, setLoading] = useState(false);

  function handleSubmit(e) {
    e.preventDefault();
    if (!email.trim()) return;
    setLoading(true);
    setTimeout(() => {
      setSent(true);
      setLoading(false);
      setTimeout(() => onLogin(), 1400);
    }, 900);
  }

  return (
    <div style={{
      minHeight: "100vh", display: "flex", alignItems: "center",
      justifyContent: "center", background: "var(--bg-base)",
    }}>
      <div className="anim-fadeInUp" style={{
        background: "var(--bg-card)", border: "1px solid var(--border)",
        borderRadius: 16, padding: "48px 40px", width: 380,
        boxShadow: "0 24px 64px rgba(0,0,0,0.7)",
      }}>
        {/* Logo */}
        <div style={{ textAlign: "center", marginBottom: 8 }}>
          <span style={{ fontFamily: "'Syne', sans-serif", fontWeight: 700, fontSize: 36, color: "var(--text-primary)", letterSpacing: "-1px" }}>
            FLOW<span style={{ color: "var(--accent)" }}>.</span>
          </span>
        </div>
        <p style={{ textAlign: "center", color: "var(--text-secondary)", fontSize: 13, marginBottom: 36, lineHeight: 1.5 }}>
          Gestão simples. Execução precisa.
        </p>

        {!sent ? (
          <form onSubmit={handleSubmit}>
            <input
              type="email"
              placeholder="seu@email.com"
              value={email}
              onChange={e => setEmail(e.target.value)}
              style={{
                width: "100%", padding: "12px 14px", background: "var(--bg-surface)",
                border: "1px solid var(--border)", borderRadius: 8,
                color: "var(--text-primary)", fontSize: 14,
                outline: "none", marginBottom: 12,
                fontFamily: "'DM Sans', sans-serif",
                transition: "border-color 0.2s",
              }}
              onFocus={e => e.target.style.borderColor = "#00FF8760"}
              onBlur={e => e.target.style.borderColor = "var(--border)"}
            />
            <button
              type="submit"
              disabled={loading}
              style={{
                width: "100%", padding: "13px", background: loading ? "var(--accent-dark)" : "var(--accent)",
                border: "none", borderRadius: 8, color: "#0D0D0D",
                fontFamily: "'DM Sans', sans-serif", fontWeight: 500, fontSize: 14,
                cursor: "pointer", transition: "background 0.2s ease",
              }}
              onMouseOver={e => { if (!loading) e.target.style.background = "var(--accent-dark)"; }}
              onMouseOut={e => { if (!loading) e.target.style.background = "var(--accent)"; }}
            >
              {loading ? "Enviando..." : "Entrar com Magic Link"}
            </button>
          </form>
        ) : (
          <div className="anim-fadeInUp" style={{
            textAlign: "center", padding: "20px 0",
          }}>
            <div style={{ fontSize: 28, marginBottom: 12 }}>✉️</div>
            <p style={{ color: "var(--accent)", fontWeight: 500, marginBottom: 6 }}>Link enviado!</p>
            <p style={{ color: "var(--text-secondary)", fontSize: 12 }}>Verificando acesso…</p>
          </div>
        )}

        <p style={{ textAlign: "center", marginTop: 24, fontSize: 11, color: "var(--text-disabled)" }}>
          Sem senha. Sem stress.
        </p>
      </div>
    </div>
  );
}

/* ── TASK CARD ───────────────────────────────────────────── */
function TaskCard({ task, onClick, isDragging, onDragStart, onDragEnd, style: extStyle, animDelay, onAccept }) {
  const { currentUser } = useAuth();
  const overdue = isOverdue(task.due) && task.status !== "done";
  const pColor = PRIORITY_COLORS[task.priority];
  const prog = task.subtasks.total > 0 ? task.subtasks.done / task.subtasks.total : 0;
  const isAvailable = !task.assignee;
  const isMine = task.assigneeInitials === currentUser.initials;
  const [hovered, setHovered] = useState(false);

  return (
    <div
      draggable
      onDragStart={e => onDragStart(e, task.id)}
      onDragEnd={onDragEnd}
      onClick={() => onClick(task)}
      className="anim-fadeInUp"
      onMouseEnter={() => setHovered(true)}
      onMouseLeave={() => setHovered(false)}
      style={{
        background: "var(--bg-card)",
        border: isAvailable ? "1px dashed #2A2A2A" : "1px solid var(--border)",
        borderRadius: 10,
        padding: "14px 14px 14px 18px",
        cursor: "pointer",
        position: "relative",
        overflow: "hidden",
        opacity: isDragging ? 0.35 : 1,
        transition: "all 0.15s",
        boxShadow: hovered && isAvailable ? "0 0 0 1px #00FF8720, 0 4px 24px rgba(0,0,0,0.4)" : "0 4px 24px rgba(0,0,0,0.4)",
        borderColor: hovered && isAvailable ? "var(--accent)" : (isAvailable ? "#2A2A2A" : "var(--border)"),
        animationDelay: animDelay || "0ms",
        ...extStyle,
      }}
    >
      {/* Priority bar */}
      <div style={{
        position: "absolute", left: 0, top: 0, bottom: 0,
        width: 3, background: pColor, borderRadius: "10px 0 0 10px",
      }}/>

      {/* Available Badge */}
      {isAvailable && (
        <div style={{
          position: "absolute", top: 12, right: 12,
          background: "var(--accent-soft)", color: "var(--accent)",
          fontSize: 10, fontWeight: 700, padding: "2px 6px", borderRadius: 4,
          letterSpacing: "0.05em"
        }}>DISPONÍVEL</div>
      )}

      {/* Title */}
      <p style={{ fontSize: 14, fontWeight: 500, color: "var(--text-primary)", lineHeight: 1.45, marginBottom: 8, paddingRight: isAvailable ? 70 : 0 }}>
        {task.title}
      </p>

      {/* Tags */}
      {task.tags.length > 0 && (
        <div style={{ display: "flex", gap: 4, flexWrap: "wrap", marginBottom: 10 }}>
          {task.tags.map(tag => (
            <span key={tag} style={{
              background: "var(--border)", color: "var(--text-secondary)",
              fontSize: 11, padding: "3px 7px", borderRadius: 4,
            }}>{tag}</span>
          ))}
        </div>
      )}

      {/* Footer */}
      <div style={{ display: "flex", alignItems: "center", gap: 8, marginTop: 4 }}>
        {isAvailable ? (
          <div style={{ width: 20, height: 20, borderRadius: "50%", border: "1px dashed #7A7A7A", display: "flex", alignItems: "center", justifyContent: "center", color: "#7A7A7A", fontSize: 12 }}>+</div>
        ) : (
          <Avatar initials={task.assigneeInitials} size={20} />
        )}
        
        <span style={{ fontSize: 12, color: overdue ? "#FF4C4C" : "var(--text-secondary)", flex: 1 }}>
          {overdue && "⚠ "}{formatDue(task.due)}
        </span>

        {isMine && !isAvailable && (
          <span style={{ fontSize: 10, color: "#7A7A7A", fontWeight: 500, marginRight: 8 }}>Aceito por você</span>
        )}

        {isAvailable && hovered && (
          <button
            onClick={(e) => { e.stopPropagation(); onAccept(task.id); }}
            className="anim-fadeInUp"
            style={{
              background: "var(--accent)", color: "#0D0D0D", border: "none",
              borderRadius: 6, padding: "4px 10px", fontSize: 11, fontWeight: 500,
              cursor: "pointer", fontFamily: "'DM Sans', sans-serif",
              animation: "fadeIn 0.15s ease both"
            }}
          >Aceitar tarefa →</button>
        )}

        <span style={{ fontSize: 11, color: "var(--text-secondary)", display: "flex", alignItems: "center", gap: 3 }}>
          <svg width="11" height="11" viewBox="0 0 11 11" fill="none">
            <rect x="0.5" y="0.5" width="10" height="10" rx="2" stroke="currentColor" strokeWidth="1"/>
            {task.subtasks.done > 0 && <path d="M2.5 5.5l2 2 4-4" stroke="var(--accent)" strokeWidth="1.2" strokeLinecap="round" strokeLinejoin="round"/>}
          </svg>
          {task.subtasks.done}/{task.subtasks.total}
        </span>
      </div>

      {/* Progress bar */}
      {task.subtasks.total > 0 && (
        <div style={{ marginTop: 8, height: 2, background: "var(--border)", borderRadius: 99, overflow: "hidden" }}>
          <div style={{ height: "100%", width: `${prog * 100}%`, background: prog === 1 ? "var(--accent)" : "#FFB800", borderRadius: 99, transition: "width 0.3s" }}/>
        </div>
      )}
    </div>
  );
}

/* ── KANBAN COLUMN ───────────────────────────────────────── */
function Column({ col, tasks, onCardClick, dragState, onDragStart, onDragEnd, onDrop, onDragOver, onAccept, isAdmin, onRename, onRemove }) {
  const [isOver, setIsOver] = useState(false);
  const [isEditing, setIsEditing] = useState(false);
  const [newLabel, setNewLabel] = useState(col.label);
  const [headerHovered, setHeaderHovered] = useState(false);
  
  const isBacklog = col.id === "backlog";
  const unassigned = isBacklog ? tasks.filter(t => !t.assignee) : [];
  const assigned = isBacklog ? tasks.filter(t => t.assignee) : tasks;

  function handleRename() {
    if (newLabel.trim() && newLabel.trim() !== col.label) {
      onRename(col.id, newLabel.trim());
    }
    setIsEditing(false);
  }

  return (
    <div
      style={{ width: 280, flexShrink: 0 }}
      onDragOver={e => { e.preventDefault(); setIsOver(true); onDragOver(col.id); }}
      onDragLeave={() => setIsOver(false)}
      onDrop={e => { setIsOver(false); onDrop(e, col.id); }}
    >
      <div style={{
        background: "var(--bg-surface)",
        border: isOver ? "1px solid #00FF8730" : "1px solid var(--border)",
        borderRadius: 12,
        padding: 12,
        minHeight: 120,
        transition: "border-color 0.15s, background 0.15s",
        background: isOver ? "#161616ee" : "var(--bg-surface)",
      }}>
        {/* Column header */}
        <div 
          onMouseEnter={() => setHeaderHovered(true)}
          onMouseLeave={() => setHeaderHovered(false)}
          style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 12, padding: "0 2px", height: 24 }}
        >
          {isEditing ? (
            <input
              autoFocus
              value={newLabel}
              onChange={e => setNewLabel(e.target.value)}
              onBlur={handleRename}
              onKeyDown={e => e.key === "Enter" && handleRename()}
              style={{
                background: "#161616", border: "1px solid var(--accent)",
                color: "var(--text-primary)", fontSize: 11, fontWeight: 600,
                padding: "2px 4px", borderRadius: 4, outline: "none", width: "120px"
              }}
            />
          ) : (
            <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
              <span style={{ fontSize: 11, fontWeight: 600, color: "var(--text-secondary)", letterSpacing: "0.15em", textTransform: "uppercase" }}>
                {col.label}
              </span>
              {isAdmin && headerHovered && (
                <div className="anim-fadeIn" style={{ display: "flex", gap: 6 }}>
                  <button onClick={() => setIsEditing(true)} style={{ background: "none", border: "none", cursor: "pointer", fontSize: 10, padding: 2, color: "var(--text-secondary)" }} title="Renomear">✏️</button>
                  {!col.locked && (
                    <button 
                      onClick={() => { if (confirm(`Deseja remover a coluna "${col.label}"?`)) onRemove(col.id); }} 
                      style={{ background: "none", border: "none", cursor: "pointer", fontSize: 10, padding: 2, color: "#3A3A3A" }} 
                      onMouseOver={e => e.currentTarget.style.color = "#FF4C4C"}
                      onMouseOut={e => e.currentTarget.style.color = "#3A3A3A"}
                      title="Remover coluna"
                    >🗑️</button>
                  )}
                </div>
              )}
            </div>
          )}
          <span style={{
            background: "var(--border)", color: "var(--text-secondary)",
            fontSize: 11, padding: "2px 7px", borderRadius: 4,
          }}>{tasks.length}</span>
        </div>

        {/* Cards container */}
        <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
          {isBacklog && unassigned.length > 0 && (
            <>
              <div style={{ fontSize: 10, fontWeight: 700, color: "#3A3A3A", letterSpacing: "0.1em", marginTop: 4, marginBottom: 4 }}>SEM RESPONSÁVEL</div>
              {unassigned.map((task, i) => (
                <TaskCard key={task.id} task={task} onClick={onCardClick} isDragging={dragState.dragId === task.id} onDragStart={onDragStart} onDragEnd={onDragEnd} onAccept={onAccept} animDelay={`${i * 50}ms`} />
              ))}
              {assigned.length > 0 && <div style={{ fontSize: 10, fontWeight: 700, color: "#3A3A3A", letterSpacing: "0.1em", marginTop: 12, marginBottom: 4 }}>ATRIBUÍDAS</div>}
            </>
          )}

          {assigned.map((task, i) => (
            <TaskCard
              key={task.id}
              task={task}
              onClick={onCardClick}
              isDragging={dragState.dragId === task.id}
              onDragStart={onDragStart}
              onDragEnd={onDragEnd}
              onAccept={onAccept}
              animDelay={`${i * 50}ms`}
            />
          ))}
          
          {tasks.length === 0 && (
            <div style={{
              height: 60, border: "1px dashed var(--border)",
              borderRadius: 8, display: "flex", alignItems: "center",
              justifyContent: "center", color: "var(--text-disabled)", fontSize: 12,
            }}>
              Solte aqui
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

/* ── TASK MODAL ──────────────────────────────────────────── */
function TaskModal({ task, onClose, onSave, onDelete, onAccept }) {
  const { currentUser, hasPermission } = useAuth();
  const [title, setTitle] = useState(task.title);
  const [editingTitle, setEditingTitle] = useState(false);
  const [desc, setDesc] = useState(task.description || "");
  const [subtasks, setSubtasks] = useState(
    Array.from({ length: task.subtasks.total }, (_, i) => ({ id: i, label: `Subtarefa ${i + 1}`, done: i < task.subtasks.done }))
  );
  const [priority, setPriority] = useState(task.priority);
  const [due, setDue] = useState(task.due);
  const titleRef = useRef();

  const isAvailable = !task.assignee;
  const isOwner = task.assigneeInitials === currentUser.initials;
  
  // Regras de edição:
  // - Admin/Gestor podem editar tudo
  // - Membro pode editar se for o dono
  // - Ninguém edita se estiver sem dono (precisa aceitar primeiro)
  const canEdit = !isAvailable && (hasPermission("edit_any_task") || (isOwner && currentUser.role === "membro"));
  
  const showDelete = !isAvailable && (hasPermission("delete_task") || (isOwner && currentUser.role === "gestor"));

  useEffect(() => { if (editingTitle) titleRef.current?.focus(); }, [editingTitle]);

  const doneSub = subtasks.filter(s => s.done).length;
  const progPct = subtasks.length > 0 ? (doneSub / subtasks.length) * 100 : 0;

  function toggleSub(id) {
    if (!canEdit) return;
    setSubtasks(prev => prev.map(s => s.id === id ? { ...s, done: !s.done } : s));
  }

  function handleSave() {
    if (!canEdit) return;
    onSave({ ...task, title, description: desc, priority, due, subtasks: { done: doneSub, total: subtasks.length } });
  }

  const pBtns = [
    { key: "low",    label: "Baixa",   color: "#00FF87" },
    { key: "medium", label: "Média",   color: "#FFB800" },
    { key: "urgent", label: "Urgente", color: "#FF4C4C" },
  ];

  const activityLog = [
    { text: `${task.assignee} adicionou esta tarefa`, time: "há 3 dias" },
    { text: "Status alterado para Em Andamento", time: "há 1 dia" },
    { text: "Prazo atualizado", time: "há 2h" },
  ];

  return (
    <div
      onClick={e => { if (e.target === e.currentTarget) onClose(); }}
      style={{
        position: "fixed", inset: 0, background: "rgba(0,0,0,0.75)",
        backdropFilter: "blur(4px)", zIndex: 1000,
        display: "flex", alignItems: "center", justifyContent: "center",
        padding: 20,
      }}
    >
      <div
        className="anim-scaleIn"
        style={{
          background: "var(--bg-modal)", border: "1px solid var(--border)",
          borderRadius: 16, width: 640, maxWidth: "100%",
          maxHeight: "90vh", overflow: "hidden", display: "flex", flexDirection: "column",
          boxShadow: "0 24px 64px rgba(0,0,0,0.7)",
        }}
      >
        {/* Modal header */}
        <div style={{ padding: "24px 28px 20px", borderBottom: "1px solid var(--border)", display: "flex", alignItems: "flex-start", gap: 12 }}>
          <div style={{ flex: 1 }}>
            {editingTitle ? (
              <input
                ref={titleRef}
                value={title}
                onChange={e => setTitle(e.target.value)}
                onBlur={() => setEditingTitle(false)}
                onKeyDown={e => e.key === "Enter" && setEditingTitle(false)}
                style={{
                  background: "transparent", border: "none", outline: "none",
                  fontFamily: "'Syne', sans-serif", fontWeight: 700, fontSize: 20,
                  color: "var(--text-primary)", width: "100%",
                  borderBottom: "1px solid var(--accent)",
                }}
              />
            ) : (
              <h2
                onClick={() => setEditingTitle(true)}
                title="Clique para editar"
                style={{
                  fontFamily: "'Syne', sans-serif", fontWeight: 700, fontSize: 20,
                  color: "var(--text-primary)", cursor: "text", lineHeight: 1.3,
                }}
              >{title}</h2>
            )}
            <span style={{
              display: "inline-block", marginTop: 8,
              background: PRIORITY_COLORS[priority] + "20",
              color: PRIORITY_COLORS[priority],
              fontSize: 11, padding: "3px 8px", borderRadius: 4,
              fontWeight: 600, letterSpacing: "0.05em",
            }}>
              {PRIORITY_LABELS[priority].toUpperCase()}
            </span>
          </div>
          <button
            onClick={onClose}
            style={{
              background: "none", border: "none", cursor: "pointer",
              color: "var(--text-secondary)", fontSize: 20, lineHeight: 1,
              transition: "color 0.15s", flexShrink: 0, marginTop: 2,
            }}
            onMouseOver={e => e.target.style.color = "var(--text-primary)"}
            onMouseOut={e => e.target.style.color = "var(--text-secondary)"}
          >✕</button>
        </div>

        {/* Modal body */}
        <div style={{ display: "flex", flex: 1, overflow: "hidden" }}>
          {/* Left column */}
          <div style={{ flex: "0 0 60%", padding: "20px 16px 20px 28px", overflowY: "auto", display: "flex", flexDirection: "column", gap: 20 }}>
            {/* Description */}
            <div>
              <label style={{ fontSize: 11, fontWeight: 600, color: "var(--text-secondary)", letterSpacing: "0.12em", textTransform: "uppercase", display: "block", marginBottom: 8 }}>Descrição</label>
              <textarea
                value={desc}
                onChange={e => setDesc(e.target.value)}
                placeholder="Adicione uma descrição..."
                rows={3}
                style={{
                  width: "100%", background: "var(--bg-card)", border: "1px solid var(--border)",
                  borderRadius: 8, color: "var(--text-primary)", fontSize: 13,
                  padding: "10px 12px", resize: "vertical", outline: "none",
                  fontFamily: "'DM Sans', sans-serif", lineHeight: 1.5,
                  transition: "border-color 0.15s",
                }}
                onFocus={e => e.target.style.borderColor = "#00FF8760"}
                onBlur={e => e.target.style.borderColor = "var(--border)"}
              />
            </div>

            {/* Subtasks */}
            <div>
              <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 10 }}>
                <label style={{ fontSize: 11, fontWeight: 600, color: "var(--text-secondary)", letterSpacing: "0.12em", textTransform: "uppercase" }}>
                  Subtarefas
                </label>
                <span style={{ fontSize: 11, color: "var(--text-secondary)" }}>{doneSub}/{subtasks.length}</span>
              </div>

              {/* Progress bar */}
              {subtasks.length > 0 && (
                <div style={{ height: 4, background: "var(--border)", borderRadius: 99, overflow: "hidden", marginBottom: 12 }}>
                  <div style={{ height: "100%", width: `${progPct}%`, background: "var(--accent)", borderRadius: 99, transition: "width 0.3s" }}/>
                </div>
              )}

              <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                {subtasks.map(s => (
                  <label key={s.id} style={{ display: "flex", alignItems: "center", gap: 10, cursor: "pointer" }}>
                    <div
                      onClick={() => toggleSub(s.id)}
                      style={{
                        width: 16, height: 16, borderRadius: 4, flexShrink: 0,
                        border: s.done ? `1.5px solid var(--accent)` : "1.5px solid var(--border)",
                        background: s.done ? "var(--accent-soft)" : "transparent",
                        display: "flex", alignItems: "center", justifyContent: "center",
                        transition: "all 0.15s",
                      }}
                    >
                      {s.done && <svg width="9" height="7" viewBox="0 0 9 7" fill="none"><path d="M1 3.5l2.5 2.5 4.5-5" stroke="var(--accent)" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>}
                    </div>
                    <span style={{ fontSize: 13, color: s.done ? "var(--text-secondary)" : "var(--text-primary)", textDecoration: s.done ? "line-through" : "none" }}>
                      {s.label}
                    </span>
                  </label>
                ))}
              </div>
            </div>

            {/* Activity */}
            <div>
              <label style={{ fontSize: 11, fontWeight: 600, color: "var(--text-secondary)", letterSpacing: "0.12em", textTransform: "uppercase", display: "block", marginBottom: 10 }}>Atividade</label>
              <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                {activityLog.map((a, i) => (
                  <div key={i} style={{ display: "flex", gap: 8, alignItems: "baseline" }}>
                    <span style={{ fontSize: 12, color: "var(--text-secondary)", flex: 1 }}>{a.text}</span>
                    <span style={{ fontSize: 11, color: "var(--text-disabled)", whiteSpace: "nowrap" }}>{a.time}</span>
                  </div>
                ))}
              </div>
            </div>
          </div>

          {/* Right column */}
          <div style={{ flex: "0 0 40%", padding: "20px 28px 20px 16px", borderLeft: "1px solid var(--border)", overflowY: "auto", display: "flex", flexDirection: "column", gap: 18 }}>
            {/* Assignee */}
            <div>
              <label style={{ fontSize: 11, fontWeight: 600, color: "var(--text-secondary)", letterSpacing: "0.12em", textTransform: "uppercase", display: "block", marginBottom: 8 }}>Responsável</label>
              <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                {isAvailable ? (
                  <span style={{ fontSize: 13, color: "var(--text-disabled)", fontStyle: "italic" }}>Sem responsável</span>
                ) : (
                  <>
                    <Avatar initials={task.assigneeInitials} size={24} />
                    <span style={{ fontSize: 13, color: "var(--text-primary)" }}>{task.assignee}</span>
                  </>
                )}
              </div>
            </div>

            {/* Due date */}
            <div>
              <label style={{ fontSize: 11, fontWeight: 600, color: "var(--text-secondary)", letterSpacing: "0.12em", textTransform: "uppercase", display: "block", marginBottom: 8 }}>Prazo</label>
              <input
                type="date"
                value={due}
                onChange={e => setDue(e.target.value)}
                style={{
                  background: "var(--bg-card)", border: "1px solid var(--border)",
                  borderRadius: 8, color: "var(--text-primary)", fontSize: 13,
                  padding: "8px 10px", outline: "none", width: "100%",
                  fontFamily: "'DM Sans', sans-serif",
                  colorScheme: "dark",
                }}
              />
            </div>

            {/* Priority */}
            <div>
              <label style={{ fontSize: 11, fontWeight: 600, color: "var(--text-secondary)", letterSpacing: "0.12em", textTransform: "uppercase", display: "block", marginBottom: 8 }}>Prioridade</label>
              <div style={{ display: "flex", gap: 4 }}>
                {pBtns.map(b => (
                  <button
                    key={b.key}
                    onClick={() => setPriority(b.key)}
                    style={{
                      flex: 1, padding: "7px 4px", borderRadius: 6, fontSize: 11, fontWeight: 500,
                      cursor: "pointer", transition: "all 0.15s",
                      border: priority === b.key ? `1px solid ${b.color}` : "1px solid var(--border)",
                      background: priority === b.key ? b.color + "20" : "var(--bg-card)",
                      color: priority === b.key ? b.color : "var(--text-secondary)",
                      fontFamily: "'DM Sans', sans-serif",
                    }}
                  >{b.label}</button>
                ))}
              </div>
            </div>

            {/* Status */}
            <div>
              <label style={{ fontSize: 11, fontWeight: 600, color: "var(--text-secondary)", letterSpacing: "0.12em", textTransform: "uppercase", display: "block", marginBottom: 8 }}>Status</label>
              <div style={{ background: "var(--bg-card)", border: "1px solid var(--border)", borderRadius: 8, padding: "8px 10px", fontSize: 13, color: "var(--text-primary)" }}>
                {COLUMNS.find(c => c.id === task.status)?.label}
              </div>
            </div>

            {/* Project */}
            <div>
              <label style={{ fontSize: 11, fontWeight: 600, color: "var(--text-secondary)", letterSpacing: "0.12em", textTransform: "uppercase", display: "block", marginBottom: 8 }}>Projeto</label>
              <div style={{ background: "var(--bg-card)", border: "1px solid var(--border)", borderRadius: 8, padding: "8px 10px", fontSize: 13, color: "var(--text-primary)" }}>
                Projeto Alpha ▾
              </div>
            </div>
          </div>
        </div>

        {/* Modal footer */}
        <div style={{ padding: "16px 28px", borderTop: "1px solid var(--border)", display: "flex", gap: 8, justifyContent: "flex-end", flexDirection: "column" }}>
          {isAvailable && (
            <button
              onClick={() => onAccept(task.id)}
              style={{
                width: "100%", background: "var(--accent)", border: "none", borderRadius: 8,
                color: "#0D0D0D", fontFamily: "'DM Sans', sans-serif", fontWeight: 600,
                fontSize: 14, padding: "12px", cursor: "pointer", transition: "background 0.2s",
                marginBottom: 8
              }}
              onMouseOver={e => e.target.style.background = "var(--accent-dark)"}
              onMouseOut={e => e.target.style.background = "var(--accent)"}
            >Aceitar esta tarefa</button>
          )}
          
          <div style={{ display: "flex", gap: 8, justifyContent: "flex-end" }}>
            {showDelete && (
              <button
                onClick={() => onDelete(task.id)}
                style={{
                  background: "transparent", border: "none", cursor: "pointer",
                  color: "#FF4C4C", fontSize: 13, padding: "9px 16px",
                  borderRadius: 8, fontFamily: "'DM Sans', sans-serif",
                  transition: "background 0.15s",
                }}
                onMouseOver={e => e.currentTarget.style.background = "#FF4C4C15"}
                onMouseOut={e => e.currentTarget.style.background = "transparent"}
              >Excluir tarefa</button>
            )}
            {canEdit && (
              <button
                onClick={handleSave}
                style={{
                  background: "var(--accent)", border: "none", borderRadius: 8,
                  color: "#0D0D0D", fontFamily: "'DM Sans', sans-serif",
                  fontWeight: 500, fontSize: 14, padding: "9px 24px",
                  cursor: "pointer", transition: "background 0.2s",
                }}
                onMouseOver={e => e.target.style.background = "var(--accent-dark)"}
                onMouseOut={e => e.target.style.background = "var(--accent)"}
              >Salvar</button>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

/* ── SIDEBAR ─────────────────────────────────────────────── */
function Sidebar({ collapsed, activeNav, setActiveNav }) {
  const { hasPermission } = useAuth();
  const items = [
    { id: "board",    icon: "📊", label: "Kanban" },
    { id: "home",     icon: "📈", label: "Dashboard", perm: "view_dashboard" },
    { id: "timeline", icon: "📅", label: "Timeline" },
    { id: "reports",  icon: "📄", label: "Relatórios", perm: "view_reports" },
    { id: "registros",icon: "📋", label: "Registros" },
    { id: "settings", icon: "⚙", label: "Ajustes" },
  ].filter(item => !item.perm || hasPermission(item.perm));

  return (
    <div style={{
      width: collapsed ? 52 : 220, flexShrink: 0,
      background: "var(--bg-base)", borderRight: "1px solid var(--border)",
      display: "flex", flexDirection: "column", gap: 2,
      padding: "12px 8px", transition: "width 0.2s ease",
      overflow: "hidden",
    }}>
      {items.map(item => {
        const active = activeNav === item.id;
        return (
          <div
            key={item.id}
            onClick={() => setActiveNav(item.id)}
            style={{
              display: "flex", alignItems: "center", gap: 10,
              padding: collapsed ? "10px 12px" : "10px 12px",
              borderRadius: 8, cursor: "pointer",
              background: active ? "var(--bg-surface)" : "transparent",
              position: "relative",
              transition: "background 0.15s",
              borderLeft: active ? "2px solid var(--accent)" : "2px solid transparent",
            }}
            onMouseOver={e => { if (!active) e.currentTarget.style.background = "var(--bg-surface)"; }}
            onMouseOut={e => { if (!active) e.currentTarget.style.background = "transparent"; }}
          >
            <span style={{ fontSize: 15, color: active ? "var(--accent)" : "var(--text-secondary)", flexShrink: 0, width: 18, textAlign: "center" }}>{item.icon}</span>
            {!collapsed && <span style={{ fontSize: 13, color: active ? "var(--accent)" : "var(--text-secondary)", fontWeight: active ? 500 : 400, whiteSpace: "nowrap" }}>{item.label}</span>}
          </div>
        );
      })}
    </div>
  );
}

/* ── NEW TASK MODAL ──────────────────────────────────────── */
function NewTaskModal({ onClose, onCreate, columns }) {
  const [title, setTitle] = useState("");
  const [priority, setPriority] = useState("medium");
  const [due, setDue] = useState("2025-07-01");
  const [status, setStatus] = useState("backlog");

  function handleCreate() {
    if (!title.trim()) return;
    onCreate({ title, priority, due, status });
  }

  return (
    <div
      onClick={e => { if (e.target === e.currentTarget) onClose(); }}
      style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.75)", backdropFilter: "blur(4px)", zIndex: 1000, display: "flex", alignItems: "center", justifyContent: "center" }}
    >
      <div className="anim-scaleIn" style={{
        background: "var(--bg-modal)", border: "1px solid var(--border)",
        borderRadius: 16, width: 420, padding: "28px",
        boxShadow: "0 24px 64px rgba(0,0,0,0.7)",
      }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
          <h3 style={{ fontFamily: "'Syne', sans-serif", fontWeight: 700, fontSize: 18, color: "var(--text-primary)" }}>Nova Tarefa</h3>
          <button onClick={onClose} style={{ background: "none", border: "none", cursor: "pointer", color: "var(--text-secondary)", fontSize: 18 }}>✕</button>
        </div>

        <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
          <input
            autoFocus
            placeholder="Título da tarefa..."
            value={title}
            onChange={e => setTitle(e.target.value)}
            onKeyDown={e => e.key === "Enter" && handleCreate()}
            style={{
              background: "var(--bg-card)", border: "1px solid var(--border)",
              borderRadius: 8, color: "var(--text-primary)", fontSize: 14,
              padding: "11px 12px", outline: "none", fontFamily: "'DM Sans', sans-serif",
            }}
            onFocus={e => e.target.style.borderColor = "#00FF8760"}
            onBlur={e => e.target.style.borderColor = "var(--border)"}
          />

          <div>
            <label style={{ fontSize: 11, color: "var(--text-secondary)", letterSpacing: "0.12em", textTransform: "uppercase", display: "block", marginBottom: 6 }}>Prioridade</label>
            <div style={{ display: "flex", gap: 6 }}>
              {[{ key: "low", label: "Baixa", color: "#00FF87" }, { key: "medium", label: "Média", color: "#FFB800" }, { key: "urgent", label: "Urgente", color: "#FF4C4C" }].map(b => (
                <button key={b.key} onClick={() => setPriority(b.key)} style={{
                  flex: 1, padding: "7px 4px", borderRadius: 6, fontSize: 11, fontWeight: 500,
                  cursor: "pointer", transition: "all 0.15s", fontFamily: "'DM Sans', sans-serif",
                  border: priority === b.key ? `1px solid ${b.color}` : "1px solid var(--border)",
                  background: priority === b.key ? b.color + "20" : "var(--bg-card)",
                  color: priority === b.key ? b.color : "var(--text-secondary)",
                }}>{b.label}</button>
              ))}
            </div>
          </div>

          <div>
            <label style={{ fontSize: 11, color: "var(--text-secondary)", letterSpacing: "0.12em", textTransform: "uppercase", display: "block", marginBottom: 6 }}>Coluna</label>
            <select value={status} onChange={e => setStatus(e.target.value)}
              style={{ width:"100%", background:"var(--bg-card)", 
              border:"1px solid var(--border)", borderRadius:8, 
              color:"var(--text-primary)", fontSize:13, 
              padding:"9px 10px", outline: "none",
              colorScheme: "dark" }}>
              {columns && columns.map(c => <option key={c.id} value={c.id}>{c.label}</option>)}
            </select>
          </div>

          <div>
            <label style={{ fontSize: 11, color: "var(--text-secondary)", letterSpacing: "0.12em", textTransform: "uppercase", display: "block", marginBottom: 6 }}>Prazo</label>
            <input type="date" value={due} onChange={e => setDue(e.target.value)}
              style={{
                width: "100%", background: "var(--bg-card)", border: "1px solid var(--border)",
                borderRadius: 8, color: "var(--text-primary)", fontSize: 13, padding: "9px 10px",
                outline: "none", fontFamily: "'DM Sans', sans-serif", colorScheme: "dark",
              }}
            />
          </div>

          <button onClick={handleCreate} style={{

function Toggle({ checked, onChange }) {
  return (
    <div
      onClick={() => onChange(!checked)}
      style={{
        width: 32, height: 18, borderRadius: 99, cursor: "pointer", transition: "background 0.2s",
        background: checked ? "var(--accent)" : "var(--border)",
        position: "relative",
      }}
    >
      <div style={{
        position: "absolute", top: 2, left: checked ? 14 : 2,
        width: 14, height: 14, borderRadius: "50%",
        background: checked ? "#0D0D0D" : "#7A7A7A",
        transition: "left 0.2s",
      }}/>
    </div>
  );
}

function NewColumnGhost({ onAdd }) {
  const [isEditing, setIsEditing] = useState(false);
  const [label, setLabel] = useState("");

  function handleConfirm() {
    if (label.trim()) {
      onAdd(label.trim());
      setLabel("");
      setIsEditing(false);
    }
  }

  if (!isEditing) {
    return (
      <div
        onClick={() => setIsEditing(true)}
        style={{
          width: 280, height: "100%", minHeight: 120, flexShrink: 0,
          border: "2px dashed #2A2A2A", borderRadius: 12,
          display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center",
          cursor: "pointer", transition: "all 0.2s", color: "#3A3A3A", gap: 12,
        }}
        onMouseOver={e => {
          e.currentTarget.style.borderColor = "var(--accent)";
          e.currentTarget.style.color = "var(--accent)";
          e.currentTarget.style.background = "var(--accent-soft)";
        }}
        onMouseOut={e => {
          e.currentTarget.style.borderColor = "#2A2A2A";
          e.currentTarget.style.color = "#3A3A3A";
          e.currentTarget.style.background = "transparent";
        }}
      >
        <span style={{ fontSize: 32 }}>+</span>
        <span style={{ fontSize: 14, fontWeight: 500 }}>Nova Coluna</span>
      </div>
    );
  }

  return (
    <div style={{ width: 280, flexShrink: 0 }}>
      <div style={{
        background: "var(--bg-surface)", border: "1px solid var(--accent)",
        borderRadius: 12, padding: 12, minHeight: 120,
      }}>
        <input
          autoFocus
          value={label}
          onChange={e => setLabel(e.target.value)}
          onKeyDown={e => {
            if (e.key === "Enter") handleConfirm();
            if (e.key === "Escape") setIsEditing(false);
          }}
          placeholder="Nome da coluna..."
          style={{
            width: "100%", background: "#161616", border: "1px solid var(--accent)",
            padding: "8px 12px", borderRadius: 8, color: "var(--text-primary)",
            outline: "none", fontFamily: "'DM Sans', sans-serif", fontSize: 13
          }}
        />
        <div style={{ display: "flex", gap: 8, marginTop: 12 }}>
          <button onClick={handleConfirm} style={{ flex: 1, background: "var(--accent)", color: "#0D0D0D", border: "none", padding: "6px", borderRadius: 6, fontSize: 12, fontWeight: 600, cursor: "pointer" }}>Adicionar</button>
          <button onClick={() => setIsEditing(false)} style={{ flex: 1, background: "transparent", border: "1px solid var(--border)", color: "var(--text-secondary)", padding: "6px", borderRadius: 6, fontSize: 12, cursor: "pointer" }}>Cancelar</button>
        </div>
      </div>
    </div>
  );
}

                <div>
                  <label style={{ fontSize: 11, color: "var(--text-secondary)", letterSpacing: "0.12em", textTransform: "uppercase", display: "block", marginBottom: 8, fontWeight: 600 }}>Cargo</label>
                  <input type="text" defaultValue="Product Manager" style={{ width: "100%", background: "var(--bg-card)", border: "1px solid var(--border)", padding: "10px 12px", borderRadius: 8, color: "var(--text-primary)", outline: "none", fontFamily: "'DM Sans', sans-serif", fontSize: 14 }} />

              </div>
              <button style={{ background: "var(--accent)", color: "#0D0D0D", border: "none", padding: "12px 24px", borderRadius: 8, fontWeight: 500, alignSelf: "flex-start", cursor: "pointer", fontFamily: "'DM Sans', sans-serif", fontSize: 14, transition: "background 0.2s" }} onMouseOver={e => e.currentTarget.style.background = "var(--accent-dark)"} onMouseOut={e => e.currentTarget.style.background = "var(--accent)"}>Salvar Alterações</button>

          {activeTab === "projetos" && (
            <div style={{ display: "flex", flexDirection: "column", gap: 24 }} className="anim-fadeInUp">

              </div>
              <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
                {[{ name: "Projeto Alpha", status: "Em andamento", date: "30 Jun" }, { name: "Redesign App", status: "Em andamento", date: "15 Ago" }].map((p, i) => (

                  </div>
                ))}
              </div>
            </div>
          )}

          {activeTab === "membros" && (
            <div style={{ display: "flex", flexDirection: "column", gap: 24 }} className="anim-fadeInUp">
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <h3 style={{ fontSize: 16, color: "var(--text-primary)", fontWeight: 600 }}>Membros da Equipe</h3>
                <button style={{ background: "transparent", border: "1px solid var(--accent)", borderRadius: 8, color: "var(--accent)", padding: "8px 16px", cursor: "pointer", fontSize: 13, transition: "background 0.2s", fontWeight: 500 }} onMouseOver={e => e.currentTarget.style.background = "var(--accent-soft)"} onMouseOut={e => e.currentTarget.style.background = "transparent"}>+ Convidar</button>
              </div>
              <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
                {membros.map((m) => (
                  <div key={m.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: 16, border: "1px solid var(--border)", borderRadius: 8, background: "var(--bg-card)" }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                      <Avatar initials={m.name.substring(0,2).toUpperCase()} size={36} />
                      <div>
                        <div style={{ fontSize: 14, color: "var(--text-primary)", fontWeight: 500, marginBottom: 2 }}>{m.name} <span style={{ fontSize: 11, color: "var(--text-secondary)", fontWeight: 400 }}>({m.type})</span></div>
                        <div style={{ fontSize: 12, color: "var(--text-secondary)" }}>{m.role}</div>
                      </div>
                    </div>
                    <Toggle checked={m.active} onChange={val => setMembros(membros.map(x => x.id === m.id ? {...x, active: val} : x))} />

              </div>
            </div>

          {activeTab === "notificacoes" && (
            <div style={{ display: "flex", flexDirection: "column", gap: 24 }} className="anim-fadeInUp">
              <h3 style={{ fontSize: 16, color: "var(--text-primary)", fontWeight: 600 }}>Preferências de Notificação</h3>
              <div style={{ display: "flex", flexDirection: "column", gap: 0 }}>
                {[
                  { id: "n1", label: "Tarefa atribuída a mim" },
                  { id: "n2", label: "Prazo chegando (48h antes)" },
                  { id: "n3", label: "Tarefa movida de coluna" },
                  { id: "n4", label: "Comentário na minha tarefa" }

                  <div key={n.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "16px 0", borderBottom: "1px solid var(--border)" }}>
                    <span style={{ fontSize: 14, color: "var(--text-primary)" }}>{n.label}</span>
                    <Toggle checked={notifs[n.id]} onChange={val => setNotifs({...notifs, [n.id]: val})} />
                  </div>
                ))}
              </div>
            </div>
          )}

          {activeTab === "aparencia" && (
            <div style={{ display: "flex", flexDirection: "column", gap: 32 }} className="anim-fadeInUp">
              <h3 style={{ fontSize: 16, color: "var(--text-primary)", fontWeight: 600 }}>Personalização</h3>
              
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <div>
                  <div style={{ fontSize: 14, color: "var(--text-primary)", fontWeight: 500, marginBottom: 4 }}>Cor de Destaque</div>
                  <div style={{ fontSize: 12, color: "var(--text-secondary)" }}>Personalize a cor principal da interface</div>
                </div>
                {/* Note: In a real app we'd dispatch to root, but here it's mockup */}
                <input type="color" defaultValue="#00FF87" style={{ width: 32, height: 32, border: "1px solid var(--border)", background: "var(--bg-card)", cursor: "pointer", borderRadius: 4, padding: 2 }} />
              </div>

              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <div>
                  <div style={{ fontSize: 14, color: "var(--text-primary)", fontWeight: 500, marginBottom: 4 }}>Modo Compacto</div>
                  <div style={{ fontSize: 12, color: "var(--text-secondary)" }}>Reduz margens e paddings globais</div>
                </div>
                <Toggle checked={compact} onChange={setCompact} />
              </div>

              <div>
                <label style={{ fontSize: 11, color: "var(--text-secondary)", letterSpacing: "0.12em", textTransform: "uppercase", display: "block", marginBottom: 12, fontWeight: 600 }}>Densidade da Interface</label>
                <div style={{ display: "flex", gap: 12 }}>
                  {["Confortável", "Compacto", "Ultra-compacto"].map((d, i) => (
                    <button key={i} onClick={() => setDensity(d)} style={{ flex: 1, padding: "10px", background: density === d ? "var(--accent-soft)" : "var(--bg-card)", border: density === d ? "1px solid var(--accent)" : "1px solid var(--border)", borderRadius: 8, color: density === d ? "var(--accent)" : "var(--text-secondary)", cursor: "pointer", fontSize: 13, transition: "all 0.2s" }}>{d}</button>
                  ))}
                </div>
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

/* ── REGISTROS COMPONENT ─────────────────────────────────── */
const TICKET_TYPES = {
  duvida:     { label: "Dúvida",     color: "#00FF87" },
  observacao: { label: "Observação", color: "#7A7A7A" },
  problema:   { label: "Problema",   color: "#FF4C4C" },
  sugestao:   { label: "Sugestão",   color: "#FFB800" },
};

const TICKET_STATUS = {
  aberto:     { label: "Aberto",     bg: "#00FF8720", text: "#00FF87" },
  em_analise: { label: "Em Análise", bg: "#FFB80020", text: "#FFB800" },
  resolvido:  { label: "Resolvido",  bg: "#3A3A3A",   text: "#7A7A7A" },
};

function Registros({ tickets, onUpdateStatus, onCreate, onRespond }) {
  const { currentUser, hasPermission } = useAuth();
  const [filter, setFilter] = useState("all");
  const [typeFilter, setTypeFilter] = useState("all");
  const [activeTicket, setActiveTicket] = useState(null);
  const [showNew, setShowNew] = useState(false);

  const myTickets = tickets.filter(t => {
    if (currentUser.role === "membro") return t.authorId === currentUser.id;
    return true;
  });

  const filtered = myTickets.filter(t => {
    if (filter !== "all" && t.status !== filter) return false;
    if (typeFilter !== "all" && t.type !== typeFilter) return false;
    return true;
  });

  return (
    <div style={{ flex: 1, padding: 32, overflowY: "auto", display: "flex", flexDirection: "column", gap: 32 }}>
      {/* Header */}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <div>
          <h2 style={{ fontFamily: "'Syne', sans-serif", fontSize: 24, fontWeight: 700, color: "var(--text-primary)", marginBottom: 8 }}>Registros</h2>
          <div style={{ display: "flex", gap: 12 }}>
            {["all", "aberto", "em_analise", "resolvido"].map(f => (
              <button key={f} onClick={() => setFilter(f)} style={{
                background: "none", border: "none", cursor: "pointer",
                color: filter === f ? "var(--accent)" : "var(--text-secondary)",
                fontSize: 13, padding: "4px 0", borderBottom: filter === f ? "2px solid var(--accent)" : "2px solid transparent",
                fontFamily: "'DM Sans', sans-serif", transition: "all 0.15s"
              }}>
                {f === "all" ? "Todos" : TICKET_STATUS[f].label}
              </button>
            ))}
          </div>
        </div>
        <button onClick={() => setShowNew(true)} style={{
          background: "transparent", border: "1px solid var(--accent)", borderRadius: 8,
          color: "var(--accent)", fontSize: 13, fontWeight: 500, padding: "8px 16px",
          cursor: "pointer", fontFamily: "'DM Sans', sans-serif", transition: "all 0.15s"
        }} onMouseOver={e => e.currentTarget.style.background = "var(--accent-soft)"} onMouseOut={e => e.currentTarget.style.background = "transparent"}>
          + Novo Registro
        </button>
      </div>

      {/* Type Pills */}
      <div style={{ display: "flex", gap: 8 }}>
        {["all", "duvida", "observacao", "problema", "sugestao"].map(t => (
          <button key={t} onClick={() => setTypeFilter(t)} style={{
            background: typeFilter === t ? "var(--accent-soft)" : "transparent",
            border: `1px solid ${typeFilter === t ? "var(--accent)" : "var(--border)"}`,
            borderRadius: 16, color: typeFilter === t ? "var(--accent)" : "var(--text-secondary)",
            padding: "4px 12px", fontSize: 11, fontWeight: 500, cursor: "pointer", transition: "all 0.15s"
          }}>
            {t === "all" ? "Todos os tipos" : TICKET_TYPES[t].label}
          </button>
        ))}
      </div>

      {/* List */}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(320px, 1fr))", gap: 16 }}>
        {filtered.map(t => (
          <TicketCard key={t.id} ticket={t} onClick={() => setActiveTicket(t)} />
        ))}
        {filtered.length === 0 && (
          <div style={{ gridColumn: "1/-1", padding: 64, textAlign: "center", color: "var(--text-disabled)", border: "1px dashed var(--border)", borderRadius: 12 }}>
            Nenhum registro encontrado.
          </div>
        )}
      </div>

      {activeTicket && (
        <TicketDetailModal
          ticket={activeTicket}
          onClose={() => setActiveTicket(null)}
          onUpdateStatus={onUpdateStatus}
          onRespond={onRespond}
        />
      )}

      {showNew && (
        <NewTicketModal
          onClose={() => setShowNew(false)}
          onCreate={onCreate}
        />
      )}
    </div>
  );
}

function TicketCard({ ticket, onClick }) {
  const typeInfo = TICKET_TYPES[ticket.type];
  const statusInfo = TICKET_STATUS[ticket.status];
  const [hovered, setHovered] = useState(false);

  return (
    <div
      onClick={onClick}
      onMouseEnter={() => setHovered(true)}
      onMouseLeave={() => setHovered(false)}
      style={{
        background: "var(--bg-card)", border: "1px solid var(--border)", borderRadius: 10,
        padding: "16px 16px 16px 20px", cursor: "pointer", position: "relative",
        transition: "all 0.15s",
        borderColor: hovered ? "var(--accent-soft)" : "var(--border)",
        boxShadow: hovered ? "0 0 0 1px #00FF8720, 0 4px 24px rgba(0,0,0,0.4)" : "0 4px 24px rgba(0,0,0,0.4)",
      }}
    >
      <div style={{ position: "absolute", left: 0, top: 0, bottom: 0, width: 3, background: typeInfo.color, borderRadius: "10px 0 0 10px" }} />
      
      <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 8 }}>
        <span style={{ fontSize: 10, fontWeight: 700, color: typeInfo.color, textTransform: "uppercase", letterSpacing: "0.05em" }}>{typeInfo.label}</span>
        <span style={{ background: statusInfo.bg, color: statusInfo.text, fontSize: 10, fontWeight: 700, padding: "2px 6px", borderRadius: 4, textTransform: "uppercase" }}>{statusInfo.label}</span>
      </div>

      <h3 style={{ fontSize: 14, fontWeight: 500, color: "var(--text-primary)", marginBottom: 12 }}>{ticket.title}</h3>

      {ticket.taskTitle && (
        <div style={{ display: "flex", alignItems: "center", gap: 6, background: "var(--bg-surface)", padding: "4px 8px", borderRadius: 4, marginBottom: 16 }}>
          <span style={{ fontSize: 11 }}>📌</span>
          <span style={{ fontSize: 11, color: "var(--text-secondary)", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{ticket.taskTitle}</span>
        </div>
      )}

      <div style={{ display: "flex", alignItems: "center", gap: 8, marginTop: "auto" }}>
        <Avatar initials={ticket.authorInitials} size={20} />
        <span style={{ fontSize: 12, color: "var(--text-secondary)", flex: 1 }}>{ticket.author}</span>
        <span style={{ fontSize: 11, color: "var(--text-disabled)" }}>{timeAgo(ticket.createdAt)}</span>
      </div>

      {ticket.responses.length > 0 && (
        <div style={{ marginTop: 12, display: "flex", alignItems: "center", gap: 4, color: "var(--text-secondary)", fontSize: 11 }}>
          <span>💬</span>
          <span>{ticket.responses.length} {ticket.responses.length === 1 ? "resposta" : "respostas"}</span>
        </div>
      )}
    </div>
  );
}

function TicketDetailModal({ ticket, onClose, onUpdateStatus, onRespond }) {
  const { currentUser, hasPermission } = useAuth();
  const [responseText, setResponseText] = useState("");
  const isAuthor = ticket.authorId === currentUser.id;
  const canRespond = hasPermission("manage_members") || currentUser.role === "gestor";
  const typeInfo = TICKET_TYPES[ticket.type];

  return (
    <div className="anim-fadeIn" style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.85)", zIndex: 2000, display: "flex", alignItems: "center", justifyContent: "center", padding: 20 }}>
      <div className="anim-scaleIn" style={{ background: "var(--bg-modal)", width: "100%", maxWidth: 900, borderRadius: 16, border: "1px solid var(--border)", overflow: "hidden", maxHeight: "90vh", display: "flex", flexDirection: "column" }}>
        
        {/* Header */}
        <div style={{ padding: "20px 28px", borderBottom: "1px solid var(--border)", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
            <h2 style={{ fontSize: 18, fontWeight: 600, color: "var(--text-primary)" }}>{ticket.title}</h2>
            <span style={{ fontSize: 10, fontWeight: 700, color: typeInfo.color, textTransform: "uppercase", letterSpacing: "0.05em", border: `1px solid ${typeInfo.color}`, padding: "2px 6px", borderRadius: 4 }}>{typeInfo.label}</span>
            <span style={{ background: TICKET_STATUS[ticket.status].bg, color: TICKET_STATUS[ticket.status].text, fontSize: 10, fontWeight: 700, padding: "2px 6px", borderRadius: 4, textTransform: "uppercase" }}>{TICKET_STATUS[ticket.status].label}</span>
          </div>
          <button onClick={onClose} style={{ background: "none", border: "none", color: "var(--text-secondary)", fontSize: 20, cursor: "pointer" }}>&times;</button>
        </div>

        {/* Content */}
        <div style={{ display: "flex", flex: 1, overflow: "hidden" }}>
          {/* Left Column */}
          <div style={{ flex: "0 0 65%", padding: 28, overflowY: "auto", borderRight: "1px solid var(--border)", display: "flex", flexDirection: "column", gap: 24 }}>
            <div>
              <label style={{ fontSize: 11, fontWeight: 600, color: "var(--text-secondary)", letterSpacing: "0.12em", textTransform: "uppercase", display: "block", marginBottom: 12 }}>Descrição</label>
              <p style={{ fontSize: 14, color: "var(--text-primary)", lineHeight: 1.6 }}>{ticket.description}</p>
            </div>

            {ticket.taskId && (
              <div style={{ background: "var(--bg-surface)", border: "1px solid var(--border)", borderRadius: 10, padding: 16, cursor: "pointer" }}>
                <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                  <span style={{ fontSize: 16 }}>📌</span>
                  <div>
                    <div style={{ fontSize: 11, color: "var(--text-secondary)", textTransform: "uppercase", fontWeight: 600 }}>Tarefa Vinculada</div>
                    <div style={{ fontSize: 14, color: "var(--accent)", fontWeight: 500 }}>{ticket.taskTitle}</div>
                  </div>
                </div>
              </div>
            )}

            <div>
              <label style={{ fontSize: 11, fontWeight: 600, color: "var(--text-secondary)", letterSpacing: "0.12em", textTransform: "uppercase", display: "block", marginBottom: 16 }}>Respostas</label>
              <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
                {ticket.responses.map(r => (
                  <div key={r.id} style={{ background: "var(--bg-surface)", borderRadius: 8, padding: 16, border: "1px solid var(--border)" }}>
                    <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 8 }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                        <Avatar initials={r.authorInitials} size={24} />
                        <span style={{ fontSize: 13, fontWeight: 500, color: "var(--text-primary)" }}>{r.author}</span>
                        {r.role && <span style={{ fontSize: 10, fontWeight: 700, color: r.role === "admin" ? "var(--accent)" : "#FFB800", textTransform: "uppercase", background: "rgba(0,0,0,0.3)", padding: "1px 5px", borderRadius: 3 }}>{r.role}</span>}
                      </div>
                      <span style={{ fontSize: 11, color: "var(--text-disabled)" }}>{timeAgo(r.createdAt)}</span>
                    </div>
                    <p style={{ fontSize: 14, color: "var(--text-primary)", lineHeight: 1.5 }}>{r.text}</p>
                  </div>
                ))}
                {ticket.responses.length === 0 && (
                  <div style={{ textAlign: "center", padding: "32px 0", color: "var(--text-disabled)", fontStyle: "italic" }}>
                    Aguardando resposta da equipe...
                  </div>
                )}
              </div>
            </div>

            {canRespond ? (
              <div style={{ marginTop: "auto", paddingTop: 24, borderTop: "1px solid var(--border)" }}>
                <textarea
                  value={responseText}
                  onChange={e => setResponseText(e.target.value)}
                  placeholder="Escreva sua resposta..."
                  style={{ width: "100%", height: 100, background: "var(--bg-card)", border: "1px solid var(--border)", borderRadius: 8, padding: 12, color: "var(--text-primary)", outline: "none", fontFamily: "inherit", resize: "none", marginBottom: 12 }}
                />
                <button
                  onClick={() => { onRespond(ticket.id, responseText); setResponseText(""); }}
                  style={{ background: "var(--accent)", color: "#0D0D0D", border: "none", padding: "10px 24px", borderRadius: 8, fontWeight: 600, cursor: "pointer", float: "right" }}
                >Responder</button>
              </div>
            ) : (
              <div style={{ textAlign: "center", color: "var(--text-disabled)", fontSize: 12, marginTop: 16 }}>Apenas administradores podem responder</div>
            )}
          </div>

          {/* Right Column */}
          <div style={{ flex: "0 0 35%", padding: 28, background: "#16161640", display: "flex", flexDirection: "column", gap: 24 }}>
            <label style={{ fontSize: 11, fontWeight: 600, color: "var(--text-secondary)", letterSpacing: "0.12em", textTransform: "uppercase" }}>Detalhes</label>
            
            <div>
              <div style={{ fontSize: 12, color: "var(--text-secondary)", marginBottom: 8 }}>Status</div>
              {canRespond ? (
                <select value={ticket.status} onChange={e => onUpdateStatus(ticket.id, e.target.value)} style={{ width: "100%", background: "var(--bg-card)", border: "1px solid var(--border)", color: "var(--text-primary)", padding: "8px 12px", borderRadius: 8, outline: "none", appearance: "none" }}>
                  <option value="aberto">Aberto</option>
                  <option value="em_analise">Em Análise</option>
                  <option value="resolvido">Resolvido</option>
                </select>
              ) : (
                <span style={{ background: TICKET_STATUS[ticket.status].bg, color: TICKET_STATUS[ticket.status].text, fontSize: 12, fontWeight: 600, padding: "4px 10px", borderRadius: 6 }}>{TICKET_STATUS[ticket.status].label}</span>
              )}
            </div>

            <div>
              <div style={{ fontSize: 12, color: "var(--text-secondary)", marginBottom: 8 }}>Prioridade</div>
              <span style={{ fontSize: 12, color: ticket.priority === "urgente" ? "#FF4C4C" : (ticket.priority === "baixa" ? "#00FF87" : "#FFB800"), fontWeight: 600, textTransform: "capitalize" }}>{ticket.priority}</span>
            </div>

            <div>
              <div style={{ fontSize: 12, color: "var(--text-secondary)", marginBottom: 8 }}>Autor</div>
              <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                <Avatar initials={ticket.authorInitials} size={32} />
                <span style={{ fontSize: 14, color: "var(--text-primary)" }}>{ticket.author}</span>
              </div>
            </div>

            <div>
              <div style={{ fontSize: 12, color: "var(--text-secondary)", marginBottom: 8 }}>Criado em</div>
              <span style={{ fontSize: 13, color: "var(--text-primary)" }}>{new Date(ticket.createdAt).toLocaleString("pt-BR")}</span>
            </div>
          </div>
        </div>

        {/* Footer */}
        <div style={{ padding: "16px 28px", borderTop: "1px solid var(--border)", display: "flex", justifyContent: "flex-end", gap: 12 }}>
          {canRespond && ticket.status !== "resolvido" && (
            <button onClick={() => onUpdateStatus(ticket.id, "resolvido")} style={{ background: "var(--accent)", color: "#0D0D0D", border: "none", padding: "10px 24px", borderRadius: 8, fontWeight: 600, cursor: "pointer" }}>Marcar como Resolvido</button>
          )}
          {isAuthor && ticket.status !== "resolvido" && (
            <button onClick={() => onUpdateStatus(ticket.id, "resolvido")} style={{ background: "transparent", border: "1px solid #FF4C4C", color: "#FF4C4C", padding: "10px 24px", borderRadius: 8, fontWeight: 600, cursor: "pointer" }}>Fechar ticket</button>
          )}
        </div>
      </div>
    </div>
  );
}
